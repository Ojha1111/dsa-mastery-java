        if (arr[mid] == target) return mid;
        else if (arr[mid] < target) lo = mid + 1;
        else hi = mid - 1;
    }
    return -1;
}`,time:"O(log n)",space:"O(1)",when:"Any sorted array search. Also 'answer space' problems."},
  {id:"bfs",title:"BFS",tag:"O(V+E) — shortest path",cat:"Graph/Tree",explain:"Explore all neighbours before going deeper. Level by level. Uses Queue. Shortest path in unweighted graph.",steps:["Add start to Queue. Mark visited.","While Queue not empty: poll a node.","For each unvisited neighbour: add to Queue, mark visited.","Done when Queue empty or target found."],code:`void bfs(int start) {
    Queue<Integer> q = new LinkedList<>();
    boolean[] vis = new boolean[n];
    q.offer(start); vis[start] = true;
    while (!q.isEmpty()) {
        int node = q.poll();
        for (int nei : graph.get(node))
            if (!vis[nei]) { vis[nei]=true; q.offer(nei); }
    }
}`,time:"O(V+E)",space:"O(V)",when:"Shortest path, level-order, minimum steps to reach."},
  {id:"dfs",title:"DFS",tag:"O(V+E) — explore all paths",cat:"Graph/Tree",explain:"Go as deep as possible before backtracking. Uses recursion or Stack. Used for paths, cycles, topological sort.",steps:["Start at node. Mark visited.","Recursively visit each unvisited neighbour.","Backtrack when no more neighbours.","Repeat until all nodes visited."],code:`void dfs(int node, boolean[] vis) {
    vis[node] = true;
    for (int nei : graph.get(node))
        if (!vis[nei]) dfs(nei, vis);
}`,time:"O(V+E)",space:"O(V)",when:"All paths, cycle detection, connected components, topo sort."},
  {id:"dp",title:"Dynamic Programming",tag:"Memo + Tabulation",cat:"Optimization",explain:"Store answers to subproblems so you never recompute. If recursion has overlapping calls — add memoization.",steps:["Write recursive solution first.","Draw recursion tree — spot repeated calls.","Add memo array to store results.","Convert to bottom-up table for best space."],code:`int[] memo = new int[n+1];
Arrays.fill(memo, -1);
int solve(int n) {
    if (n <= 1) return n;
    if (memo[n] != -1) return memo[n];
    return memo[n] = solve(n-1) + solve(n-2);
}`,time:"O(n) to O(n²) typically",space:"O(n) to O(n²)",when:"Min/max ways, count paths, optimal value, can you reach target."}
];

function buildPlan(){
  let total=0, html='';
  plan.forEach(ph=>{
    html+='<div class="phase-header">'+ph.phase+'</div>';
    ph.days.forEach(d=>{
      html+='<div class="day-card"><div class="day-top"><span class="day-num">Day '+d.d+'</span><span class="day-topic t-'+d.type+'">'+d.topic+'</span></div>';
      d.tasks.forEach((t,ti)=>{
        const key='d'+d.d+'_t'+ti; total++;
        html+='<div class="task-row"><input type="checkbox" id="'+key+'" onchange="chk(\''+key+'\')"><label class="task-label" id="lbl_'+key+'" for="'+key+'">'+t.t+(t.lc?'<a class="lc-link" href="'+t.lc+'" target="_blank">'+t.ln+'</a>':'')+'</label></div>';
      });
      html+='</div>';
    });
  });
  document.getElementById('plan-out').innerHTML=html;
  document.getElementById('prog-txt').textContent='0 / '+total+' tasks done';
  window._total=total;
}

const _checked={};
function chk(key){
  const cb=document.getElementById(key);
  _checked[key]=cb.checked;
  document.getElementById('lbl_'+key).classList.toggle('done',cb.checked);
  const done=Object.values(_checked).filter(Boolean).length;
  document.getElementById('prog-txt').textContent=done+' / '+window._total+' tasks done';
  document.getElementById('prog-fill').style.width=Math.round(done/window._total*100)+'%';
}

let activeFilter='All';
function buildPatterns(){
  const filters=['All','Beginner','Medium','Hard'];
  let html='<div class="pat-intro">For every new problem, ask these 3 questions: <strong style="color:var(--color-text-primary)">1) Is the array sorted?</strong> <strong style="color:var(--color-text-primary)">2) What am I looking for (pair, subarray, path)?</strong> <strong style="color:var(--color-text-primary)">3) Do I need ALL results or just ONE optimal?</strong> Then match to a pattern below.</div>';
  html+='<div class="pat-filter-row" id="filter-row">';
  filters.forEach(f=>html+='<button class="pat-filter'+(f==='All'?' active':'')+'" onclick="filterPat(\''+f+'\')">'+f+'</button>');
  html+='</div><div id="pat-list"></div>';
  document.getElementById('patterns-out').innerHTML=html;
  renderPatterns('All');
}

function filterPat(f){
  activeFilter=f;
  document.querySelectorAll('.pat-filter').forEach(el=>el.classList.toggle('active',el.textContent===f));
  renderPatterns(f);
}

function renderPatterns(f){
  const filtered = f==='All' ? patterns : patterns.filter(p=>p.difficulty.includes(f==='Beginner'?'Beginner':f==='Medium'?'Medium':'Hard'));
  let html='';
  filtered.forEach((p,i)=>{
    const diffColor = p.difficulty==='Beginner'?'pb-g':p.difficulty.includes('Hard')?'pb-r':'pb-o';
    html+='<div class="pat-card"><div class="pat-head" onclick="togglePat(\''+p.id+'\')"><div style="flex:1"><span class="pat-badge '+diffColor+'">'+p.difficulty+'</span> <span style="font-size:13px;font-weight:500;color:var(--color-text-primary)">'+p.title+'</span><div style="margin-top:5px">'+p.badges.map(b=>'<span class="pat-badge '+b.c+'">'+b.l+'</span>').join('')+'</div></div><span class="chevron" id="pch_'+p.id+'">▼</span></div>';
    html+='<div class="pat-body" id="pb_'+p.id+'">';
    html+='<div class="ds-section"><div class="ds-section-title">What is this pattern?</div><div class="ds-text">'+p.desc+'</div></div>';
    html+='<div class="ds-section"><div class="ds-section-title">How to identify — keywords to look for</div><div class="keyword-row">'+p.keywords.map(k=>'<span class="keyword">'+k+'</span>').join('')+'</div></div>';
    html+='<div class="ds-section"><div class="ds-section-title">Visual trace</div><div class="visual-box">'+p.visual+'</div></div>';
    html+='<div class="ds-section"><div class="ds-section-title">Approach / template</div><div class="visual-box">'+p.approach+'</div></div>';
    html+='<div class="ds-section"><div class="ds-section-title">Java code template</div><div class="code-block">'+p.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div>';
    html+='<div class="ds-section"><div class="ds-section-title">Practice problems</div>';
    p.problems.forEach(pr=>{
      const dc=pr.d==='e'?'diff-e':pr.d==='m'?'diff-m':'diff-h';
      const dl=pr.d==='e'?'Easy':pr.d==='m'?'Medium':'Hard';
      html+='<div class="prob-row"><a href="'+pr.lc+'" target="_blank" style="color:var(--color-text-primary);text-decoration:none;">'+pr.n+'</a><span class="'+dc+'">'+dl+'</span></div>';
    });
    html+='</div>';
    html+='<div class="tip-box"><div class="tip-text">⚡ Key trick: '+p.trick+'</div></div>';
    html+='</div></div>';
  });
  document.getElementById('pat-list').innerHTML=html;
}

function togglePat(id){
  const b=document.getElementById('pb_'+id);
  const ch=document.getElementById('pch_'+id);
  const open=b.classList.toggle('open');
  ch.classList.toggle('open',open);
}

function buildDS(){
  let html='';
  dsData.forEach((d,i)=>{
    html+='<div class="ds-card"><div class="ds-head" onclick="toggleDS('+i+')"><div><span style="font-size:15px">'+d.emoji+'</span> <span class="ds-title">'+d.title+'</span> <span style="font-size:11px;color:var(--color-text-tertiary);margin-left:6px">'+d.tag+'</span></div><span class="chevron" id="ch'+i+'">▼</span></div>';
    html+='<div class="ds-body" id="ds'+i+'"><div class="ds-section"><div class="ds-section-title">Real-world analogy</div><div class="ds-text">'+d.analogy+'</div></div>';
    html+='<div class="ds-section"><div class="ds-section-title">Use when</div><div class="ds-text">'+d.when+'</div></div>';
    html+='<div class="ds-section"><div class="ds-section-title">Key operations</div>';
    d.ops.forEach(o=>html+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary)"><span>'+o.n+'</span><span class="c-badge c-'+o.q+'">'+o.c+'</span></div>');
    html+='</div><div class="ds-section"><div class="ds-section-title">Java code</div><div class="code-block">'+d.java.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div>';
    html+='<div class="tip-box"><div class="tip-text">💡 '+d.tip+'</div></div></div></div>';
  });
  document.getElementById('ds-out').innerHTML=html;
}

function toggleDS(i){
  const b=document.getElementById('ds'+i),ch=document.getElementById('ch'+i);
  ch.classList.toggle('open',b.classList.toggle('open'));
}

function buildAlgo(){
  let html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:12px">';
  algoData.forEach(a=>html+='<div class="algo-mini" id="btn_'+a.id+'" onclick="showAlgo(\''+a.id+'\')"><div class="algo-mini-title">'+a.title+'</div><div class="algo-mini-tag">'+a.cat+' · '+a.time+'</div></div>');
  html+='</div><div id="algo-detail-box"></div>';
  document.getElementById('algo-out').innerHTML=html;
}

function showAlgo(id){
  document.querySelectorAll('.algo-mini').forEach(el=>el.classList.remove('selected'));
  document.getElementById('btn_'+id).classList.add('selected');
  const a=algoData.find(x=>x.id===id);
  const qTime=a.time.includes('n²')?'bad':a.time.includes('log')?'good':'ok';
  let stepsHtml=a.steps.map((s,i)=>'<div class="step"><div class="step-num">'+(i+1)+'</div><div class="step-text">'+s+'</div></div>').join('');
  document.getElementById('algo-detail-box').innerHTML='<div class="algo-detail show"><div style="margin-bottom:10px"><strong style="font-size:13px">'+a.title+'</strong> <span style="font-size:11px;color:var(--color-text-secondary)">'+a.tag+'</span></div><div class="ds-section"><div class="ds-section-title">What it does</div><div class="ds-text">'+a.explain+'</div></div><div class="ds-section"><div class="ds-section-title">Steps</div>'+stepsHtml+'</div><div class="ds-section"><div class="ds-section-title">Java code</div><div class="code-block">'+a.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div><div style="display:flex;gap:8px;margin-top:8px"><span class="c-badge c-'+qTime+'">Time: '+a.time+'</span><span class="c-badge c-good">Space: '+a.space+'</span></div><div class="tip-box" style="margin-top:10px"><div class="tip-text">📌 Use when: '+a.when+'</div></div></div>';
}

function buildHow(){
  const steps=[
    {n:1,title:"Read the problem 3 times",body:"First: what does it want? Second: input/output format? Third: constraints (array size, value range). Most beginners jump to code after 1 read — don't."},
    {n:2,title:"Write an example by hand",body:"Take the given example and trace it step by step on paper. Then make your own small example (3–4 elements) and trace that too."},
    {n:3,title:"Identify the pattern",body:"Ask in order:\n• Is the array sorted? → Binary Search or Two Pointers\n• Need a pair/sum? → HashMap or Two Pointers\n• Substring/subarray with condition? → Sliding Window\n• Linked List middle/cycle? → Fast & Slow Pointers\n• Generate ALL combinations? → Backtracking\n• Min/max optimal value? → DP\n• Nodes + connections? → Graph BFS/DFS"},
    {n:4,title:"Write brute force first",body:"Always write the O(n²) naive solution first. It may not pass, but it proves you understand the problem. Then optimize. Interviewers love seeing your thought process."},
    {n:5,title:"Dry run before coding",body:"Trace your algorithm on your small example, step by step. Write the value of each variable at each step. If dry run is wrong, fix logic now — not after writing code."},
    {n:6,title:"Code it",body:"Now open LeetCode. Start with the method signature provided. Use standard variable names: i, j, left, right, mid, slow, fast, curr, result."},
    {n:7,title:"Test edge cases",body:"After passing: test empty array [], single element [5], all same elements [3,3,3], negatives if applicable. These are common interview traps."},
    {n:8,title:"Analyse complexity",body:"Always ask: Time complexity? Space complexity? Can I improve it? Write this as a comment at the top of your solution file."}
  ];
  const rules=[
    {t:"Stuck for 20+ min?",b:"Look at just the hint/approach — not the code. Never look at a full solution until you've genuinely struggled."},
    {t:"If you do look at the solution",b:"Close it. Wait 10 minutes. Then write it from scratch yourself. Copy-pasting = 0 learning. Struggle + understand + rewrite = real learning."},
    {t:"Don't memorise solutions",b:"Memorise patterns. The same Sliding Window / HashMap / DFS pattern appears in hundreds of different problems. Patterns are the key."},
    {t:"One problem at a time",b:"Don't open 5 problems. Solve 1 completely, understand it, push to GitHub, move on. Quality over quantity."},
    {t:"Paper before keyboard",b:"Draw. Trace. Write pseudocode on paper first for any medium/hard problem. The best programmers sketch before they type."}
  ];
  let html='<div class="ds-section" style="margin-bottom:1.5rem"><div class="ds-section-title">8-step process for every problem</div>';
  steps.forEach(s=>html+='<div style="border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:10px 12px;margin-bottom:8px"><div style="display:flex;gap:10px;align-items:flex-start"><div style="min-width:22px;height:22px;background:#E6F1FB;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#185FA5;flex-shrink:0;margin-top:1px">'+s.n+'</div><div><div style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px">'+s.title+'</div><div style="font-size:12px;color:var(--color-text-secondary);line-height:1.7;white-space:pre-line">'+s.body+'</div></div></div></div>');
  html+='</div><div class="ds-section"><div class="ds-section-title">Golden rules for beginners</div>';
  rules.forEach(r=>html+='<div class="tip-box" style="margin-bottom:8px"><div style="font-size:12px;font-weight:500;color:#085041;margin-bottom:3px">'+r.t+'</div><div class="tip-text">'+r.b+'</div></div>');
  html+='</div>';
  document.getElementById('how-out').innerHTML=html;
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  const names=['plan','patterns','ds','algo','how'];
  document.querySelectorAll('.tab')[names.indexOf(name)].classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

buildPlan(); buildPatterns(); buildDS(); buildAlgo(); buildHow();
</script>
